body:
  text: 尊者安惠造論如有頌言諸佛出現樂演説正法樂僧衆和合樂同修勇進樂論説北俱盧洲衣重一兩四天王衆天衣重半兩三十三天衣重一銖夜摩天衣重半銖覩史多天衣重一銖中四分之一樂變化天衣重一銖八分之一他化自在天衣重一銖中十六分之一已上色界天衣不可稱彼界若有重何言不可稱色界諸天隨其身量所著衣服如光皎淨故不可言表色相今次當説頌曰亂心無心等隨流淨不淨大種所造性由此説無表六失惣説頌云初闕相續及假是無心隨流表相雜重置等言不簡別故此説中有六失此是眼耳鼻舌身意也説諸心六失中自異意故説頌云作等餘心等及無心有記無對所造性是名無表色云地與地界有何差別論頌曰地謂顯形色隨世想立名水火亦復然風即界亦爾論故義品中作如説趣求諸欲人常起於希望諸欲若不遂惱壞如箭中説六識當説論頌曰受領納隨觸想取像為體四餘名行蘊如是受等三及無表無為名法處法界三蘊七事如有頌云三蘊與無表及三種無為此法處所攝法界亦如是頌曰識為各了別此即名意處及七界應知六識轉為意頌曰惣攝一切法由一蘊處界攝自性非餘以離他性故
