body:
  text: 尊者安惠造三科一聚二生門三種族聚蘊義生門義心心所法生長門義生於眼識以眼為門此經證門義有六然心所法有十二故契經說眼色為緣生於眼識三和合觸起俱受想思如是乃至意法為緣生於意識三和合種族義是界義如一山中有多銅鐵金銀界族說名多界如是一身或一相續有十八類諸法種族名十八界眼根現在未來過去是無明顛倒頌曰如魚處泥中躍水令渾濁無明中倒想污患亦復然蘊名想頌曰牟尼說法蘊數有八十千彼體語或名此必行蘊攝論頌曰空界謂竅隟傳說是明暗識界有漏識有情生所依論卷第二十八界中幾有見幾無見幾有對幾無對幾善幾不善幾無記頌曰一有見謂色十有色有對此八除色聲無記得三種五無分別由計度隨念以意地散惠意諸念為體論曰說分別略有三種一自性分別二計度分別三隨念分別由五識身雖有自性而無餘二說有八種分別非也唯有自性分別而無計度隨念分別唯一分別名無分別
